html, body { height: 100%; margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
.loader-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.85); backdrop-filter: blur(8px); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; transition: opacity 0.3s; }
.loader-overlay.hidden { opacity: 0; pointer-events: none; }
.spinner { width: 48px; height: 48px; border: 4px solid rgba(99,102,241,0.3); border-top-color: #818cf8; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.fade-in { animation: fadeIn 0.4s ease; }

.quiz-nav-btn.unanswered { background: #374151; color: #9ca3af; }
.quiz-nav-btn.answered { background: #059669; color: white; }
.quiz-nav-btn.flagged { background: #d97706; color: white; }
.quiz-nav-btn.active { border-color: #818cf8; box-shadow: 0 0 0 2px rgba(129,140,248,0.3); }
.toast { position: fixed; top: 20px; right: 20px; z-index: 10000; padding: 12px 20px; border-radius: 10px; color: white; font-weight: 500; font-size: 14px; animation: fadeIn 0.3s ease; max-width: 350px; }

 </head>
 <body class="h-full bg-slate-900 text-white">
  <div id="loader" class="loader-overlay hidden">
   <div class="spinner"></div>
   <p id="loader-text" class="text-indigo-300 font-medium text-sm">Memproses…</p>
  </div>
  <div id="app" class="h-full overflow-auto w-full"></div>
  <script>
// ─── STATE ───
let allData = [];
let currentUser = null; // { role:'guru'|'siswa', name, absen, kelas }
let currentView = 'login';
let quizState = null; // { currentQ, answers:{}, flags:Set, startTime, violations, timer, penaltyTotal }
let cheatOverlayTimeout = null;

const defaultConfig = {
  school_name: 'SMP Negeri 1',
  app_title: 'E-Learning Sekolah',
  background_color: '#0f172a',
  surface_color: '#1e293b',
  text_color: '#e2e8f0',
  primary_color: '#818cf8',
  secondary_color: '#475569'
};

// ─── HELPERS ───
function showLoader(text = 'Memproses…') {
  const l = document.getElementById('loader');
  document.getElementById('loader-text').textContent = text;
  l.classList.remove('hidden');
}
function hideLoader() { document.getElementById('loader').classList.add('hidden'); }

function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function getStudents() { return allData.filter(d => d.type === 'student'); }
function getGrades() { return allData.filter(d => d.type === 'grade'); }
function getQuestions() { return allData.filter(d => d.type === 'question').sort((a,b) => (a.q_number||0) - (b.q_number||0)); }
function getQuizResults() { return allData.filter(d => d.type === 'quiz_result'); }
function getActivityPoints() { return allData.filter(d => d.type === 'activity_point'); }
function getQuizSettings() { return allData.find(d => d.type === 'quiz_settings'); }

function getStudentPoints(name, kelas) {
  return getActivityPoints().filter(d => d.name === name && d.kelas === kelas).reduce((s, d) => s + (d.point || 0), 0);
}

function getClassRanking(kelas) {
  const students = getStudents().filter(s => s.kelas === kelas);
  const ranked = students.map(s => ({
    name: s.name, absen: s.absen,
    points: getStudentPoints(s.name, kelas)
  })).sort((a, b) => b.points - a.points);
  return ranked;
}

// ─── DATA SDK ───
const dataHandler = {
  onDataChanged(data) {
    allData = data;
    if (currentView !== 'quiz-taking') renderCurrentView();
  }
};

// ─── ELEMENT SDK ───
window.elementSdk.init({
  defaultConfig,
  async onConfigChange(config) {
    document.body.style.background = config.background_color || defaultConfig.background_color;
    renderCurrentView();
  },
  mapToCapabilities(config) {
    const mkColor = (key) => ({
      get: () => config[key] || defaultConfig[key],
      set: (v) => { config[key] = v; window.elementSdk.setConfig({ [key]: v }); }
    });
    return {
      recolorables: [mkColor('background_color'), mkColor('surface_color'), mkColor('text_color'), mkColor('primary_color'), mkColor('secondary_color')],
      borderables: [],
      fontEditable: {
        get: () => config.font_family || 'Plus Jakarta Sans',
        set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
      },
      fontSizeable: {
        get: () => config.font_size || 16,
        set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
      }
    };
  },
  mapToEditPanelValues(config) {
    return new Map([
      ['school_name', config.school_name || defaultConfig.school_name],
      ['app_title', config.app_title || defaultConfig.app_title]
    ]);
  }
});

(async () => {
  showLoader('Memuat sistem…');
  const r = await window.dataSdk.init(dataHandler);
  if (!r.isOk) showToast('Gagal memuat data', 'error');
  hideLoader();
  renderCurrentView();
})();

// ─── CONFIG HELPER ───
function C(key) {
  const cfg = window.elementSdk.config || {};
  return cfg[key] || defaultConfig[key] || '';
}
function fontStack() {
  const cf = (window.elementSdk.config || {}).font_family || 'Plus Jakarta Sans';
  return `${cf}, Plus Jakarta Sans, sans-serif`;
}
function baseFontSize() { return (window.elementSdk.config || {}).font_size || 16; }

// ─── RENDER ───
function renderCurrentView() {
  const app = document.getElementById('app');
  app.style.fontFamily = fontStack();
  app.style.fontSize = baseFontSize() + 'px';
  app.style.color = C('text_color');
  app.style.background = C('background_color');

  if (currentView === 'login') renderLogin(app);
  else if (currentView === 'guru-dashboard') renderGuruDashboard(app);
  else if (currentView === 'siswa-dashboard') renderSiswaDashboard(app);
  else if (currentView === 'quiz-taking') {} // managed separately
}

// ─── LOGIN ───
function renderLogin(app) {
  const primary = C('primary_color');
  const surface = C('surface_color');
  app.innerHTML = `
  <div class="h-full flex items-center justify-center p-4 fade-in">
    <div style="background:${surface}; max-width:420px;" class="w-full rounded-2xl p-6 md:p-8 shadow-2xl">
      <div class="text-center mb-6">
        <div style="background:${primary}20; color:${primary};" class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-3">
          <i data-lucide="graduation-cap" style="width:32px;height:32px;"></i>
        </div>
        <h1 class="text-xl font-bold">${C('app_title')}</h1>
        <p class="text-sm opacity-60 mt-1">${C('school_name')}</p>
      </div>
      <div class="flex gap-2 mb-5 bg-slate-800 rounded-xl p-1">
        <button id="tab-guru" onclick="switchLoginTab('guru')" class="flex-1 py-2 rounded-lg text-sm font-semibold transition" style="background:${primary};color:white;">Guru</button>
        <button id="tab-siswa" onclick="switchLoginTab('siswa')" class="flex-1 py-2 rounded-lg text-sm font-semibold transition opacity-60">Siswa</button>
      </div>
      <div id="login-form-guru">
        <input id="guru-user" placeholder="Username" class="w-full mb-3 px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-sm focus:outline-none focus:border-indigo-500">
        <input id="guru-pass" type="password" placeholder="Password" class="w-full mb-4 px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-sm focus:outline-none focus:border-indigo-500">
        <button onclick="loginGuru()" style="background:${primary};" class="w-full py-3 rounded-xl font-semibold text-white text-sm hover:opacity-90 transition">Masuk sebagai Guru</button>
      </div>
      <div id="login-form-siswa" class="hidden">
        <input id="siswa-nama" placeholder="Nama Lengkap" class="w-full mb-3 px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-sm focus:outline-none focus:border-indigo-500">
        <input id="siswa-absen" type="number" placeholder="Nomor Absen" class="w-full mb-3 px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-sm focus:outline-none focus:border-indigo-500">
        <select id="siswa-kelas" class="w-full mb-4 px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-sm focus:outline-none focus:border-indigo-500">
          <option value="">Pilih Kelas</option>
          <option>7E</option><option>7F</option><option>7G</option>
          <option>8A</option><option>8B</option><option>8C</option>
        </select>
        <button onclick="loginSiswa()" style="background:${primary};" class="w-full py-3 rounded-xl font-semibold text-white text-sm hover:opacity-90 transition">Masuk sebagai Siswa</button>
      </div>
      <p id="login-error" class="text-red-400 text-xs mt-3 text-center hidden"></p>
    </div>
  </div>`;
  lucide.createIcons();
}

window.switchLoginTab = function(tab) {
  const primary = C('primary_color');
  document.getElementById('login-form-guru').classList.toggle('hidden', tab !== 'guru');
  document.getElementById('login-form-siswa').classList.toggle('hidden', tab !== 'siswa');
  document.getElementById('tab-guru').style.background = tab === 'guru' ? primary : 'transparent';
  document.getElementById('tab-guru').style.color = tab === 'guru' ? 'white' : '';
  document.getElementById('tab-guru').style.opacity = tab === 'guru' ? '1' : '0.6';
  document.getElementById('tab-siswa').style.background = tab === 'siswa' ? primary : 'transparent';
  document.getElementById('tab-siswa').style.color = tab === 'siswa' ? 'white' : '';
  document.getElementById('tab-siswa').style.opacity = tab === 'siswa' ? '1' : '0.6';
};

window.loginGuru = function() {
  const u = document.getElementById('guru-user').value.trim();
  const p = document.getElementById('guru-pass').value.trim();
  const err = document.getElementById('login-error');
  if (u === 'guru' && p === 'sadtau') {
    currentUser = { role: 'guru' };
    currentView = 'guru-dashboard';
    renderCurrentView();
  } else {
    err.textContent = 'Username atau password salah';
    err.classList.remove('hidden');
  }
};

window.loginSiswa = function() {
  const nama = document.getElementById('siswa-nama').value.trim();
  const absen = parseInt(document.getElementById('siswa-absen').value);
  const kelas = document.getElementById('siswa-kelas').value;
  const err = document.getElementById('login-error');
  if (!nama || !absen || !kelas) { err.textContent = 'Semua field harus diisi'; err.classList.remove('hidden'); return; }
  const found = getStudents().find(s => s.name.toLowerCase() === nama.toLowerCase() && s.absen === absen && s.kelas === kelas);
  if (found) {
    currentUser = { role: 'siswa', name: found.name, absen: found.absen, kelas: found.kelas };
    currentView = 'siswa-dashboard';
    renderCurrentView();
  } else {
    err.textContent = 'Data siswa tidak ditemukan';
    err.classList.remove('hidden');
  }
};

// ─── GURU DASHBOARD ───
let guruTab = 'students';
function renderGuruDashboard(app) {
  const primary = C('primary_color');
  const surface = C('surface_color');
  const tabs = [
    { id: 'students', icon: 'users', label: 'Siswa' },
    { id: 'grades', icon: 'file-text', label: 'Nilai' },
    { id: 'activity', icon: 'star', label: 'Keaktifan' },
    { id: 'quiz', icon: 'help-circle', label: 'Kuis' },
    { id: 'results', icon: 'bar-chart-2', label: 'Hasil' }
  ];

  app.innerHTML = `
  <div class="h-full flex flex-col w-full fade-in">
    <header style="background:${surface};" class="px-4 py-3 flex items-center justify-between border-b border-slate-700 shrink-0">
      <div>
        <h1 class="text-lg font-bold">${C('app_title')}</h1>
        <p class="text-xs opacity-50">${C('school_name')} • Panel Guru</p>
      </div>
      <button onclick="logout()" class="text-xs px-3 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition">
        <i data-lucide="log-out" style="width:14px;height:14px;display:inline;vertical-align:middle;"></i> Keluar
      </button>
    </header>
    <nav class="flex overflow-x-auto gap-1 p-2 shrink-0" style="background:${surface};">
      ${tabs.map(t => `
        <button onclick="setGuruTab('${t.id}')" class="flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-medium whitespace-nowrap transition ${guruTab === t.id ? '' : 'opacity-50 hover:opacity-75'}" style="${guruTab === t.id ? `background:${primary}20;color:${primary};` : ''}">
          <i data-lucide="${t.icon}" style="width:14px;height:14px;"></i>${t.label}
        </button>
      `).join('')}
    </nav>
    <div id="guru-content" class="flex-1 overflow-auto p-4"></div>
  </div>`;

  renderGuruTab();
}

window.setGuruTab = function(tab) { guruTab = tab; renderCurrentView(); };
window.logout = function() { currentUser = null; currentView = 'login'; quizState = null; renderCurrentView(); };

function renderGuruTab() {
  const el = document.getElementById('guru-content');
  if (!el) return;
  if (guruTab === 'students') renderGuruStudents(el);
  else if (guruTab === 'grades') renderGuruGrades(el);
  else if (guruTab === 'activity') renderGuruActivity(el);
  else if (guruTab === 'quiz') renderGuruQuiz(el);
  else if (guruTab === 'results') renderGuruResults(el);
}

function card(inner) {
  return `<div style="background:${C('surface_color')};" class="rounded-2xl p-4 md:p-5 mb-4">${inner}</div>`;
}

// ─── GURU: STUDENTS ───
function renderGuruStudents(el) {
  const students = getStudents();
  const primary = C('primary_color');
  const classes = [...new Set(students.map(s => s.kelas))].sort();
  el.innerHTML = card(`
    <h2 class="font-bold text-base mb-3"><i data-lucide="users" style="width:18px;height:18px;display:inline;vertical-align:middle;margin-right:6px;"></i>Kelola Data Siswa</h2>
    <p class="text-xs opacity-50 mb-3">Format: nomor_absen nama_siswa (satu per baris)</p>
    <select id="student-kelas" class="w-full mb-3 px-3 py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-sm">
      <option value="">Pilih Kelas</option>
      <option>7E</option><option>7F</option><option>7G</option>
      <option>8A</option><option>8B</option><option>8C</option>
    </select>
    <textarea id="student-input" rows="5" placeholder="1 Andi Pratama\n2 Budi Santoso\n3 Citra Lestari" class="w-full mb-3 px-3 py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-sm font-mono resize-none"></textarea>
    <button onclick="parseStudents()" style="background:${primary};" class="w-full py-2.5 rounded-xl text-sm font-semibold text-white hover:opacity-90 transition">Simpan Siswa</button>
  `) + card(`
    <h3 class="font-semibold text-sm mb-3">Daftar Siswa (${students.length})</h3>
    ${classes.length === 0 ? '<p class="text-xs opacity-40">Belum ada data siswa</p>' :
      classes.map(k => `
        <div class="mb-3">
          <p class="text-xs font-semibold opacity-60 mb-1.5">Kelas ${k}</p>
          ${students.filter(s => s.kelas === k).sort((a,b) => a.absen - b.absen).map(s => `
            <div class="flex items-center justify-between py-1.5 px-2 rounded-lg hover:bg-slate-700/50 text-xs">
              <span>${s.absen}. ${s.name}</span>
              <button onclick="deleteRecord('${s.__backendId}')" class="text-red-400 hover:text-red-300"><i data-lucide="trash-2" style="width:13px;height:13px;"></i></button>
            </div>
          `).join('')}
        </div>
      `).join('')}
  `);
  lucide.createIcons();
}

window.parseStudents = async function() {
  const kelas = document.getElementById('student-kelas').value;
  const text = document.getElementById('student-input').value.trim();
  if (!kelas) { showToast('Pilih kelas terlebih dahulu', 'error'); return; }
  if (!text) { showToast('Masukkan data siswa', 'error'); return; }
  const lines = text.split('\n').filter(l => l.trim());
  const parsed = [];
  for (const line of lines) {
    const match = line.trim().match(/^(\d+)\s+(.+)$/);
    if (!match) { showToast(`Format salah: "${line.trim()}"`, 'error'); return; }
    parsed.push({ type: 'student', absen: parseInt(match[1]), name: match[2].trim(), kelas });
  }
  if (allData.length + parsed.length > 999) { showToast('Batas data tercapai (999)', 'error'); return; }
  showLoader('Menyimpan data siswa…');
  for (const s of parsed) {
    const r = await window.dataSdk.create(s);
    if (!r.isOk) { showToast('Gagal menyimpan', 'error'); hideLoader(); return; }
  }
  hideLoader();
  showToast(`${parsed.length} siswa berhasil ditambahkan`);
};

window.deleteRecord = async function(id) {
  const rec = allData.find(d => d.__backendId === id);
  if (!rec) return;
  showLoader('Menghapus…');
  const r = await window.dataSdk.delete(rec);
  hideLoader();
  if (r.isOk) showToast('Berhasil dihapus');
  else showToast('Gagal menghapus', 'error');
};

// ─── GURU: GRADES ───
function renderGuruGrades(el) {
  const primary = C('primary_color');
  const grades = getGrades();
  el.innerHTML = card(`
    <h2 class="font-bold text-base mb-3"><i data-lucide="file-text" style="width:18px;height:18px;display:inline;vertical-align:middle;margin-right:6px;"></i>Input Nilai Manual</h2>
    <p class="text-xs opacity-50 mb-3">Format: nomor_absen nilai (satu per baris)</p>
    <select id="grade-kelas" class="w-full mb-3 px-3 py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-sm">
      <option value="">Pilih Kelas</option>
      <option>7E</option><option>7F</option><option>7G</option>
      <option>8A</option><option>8B</option><option>8C</option>
    </select>
    <input id="grade-quiz-id" placeholder="Nama Mata Pelajaran / Kuis" class="w-full mb-3 px-3 py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-sm">
    <textarea id="grade-input" rows="5" placeholder="1 85\n2 90\n3 78" class="w-full mb-3 px-3 py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-sm font-mono resize-none"></textarea>
    <button onclick="parseGrades()" style="background:${primary};" class="w-full py-2.5 rounded-xl text-sm font-semibold text-white hover:opacity-90 transition">Simpan Nilai</button>
  `);
  lucide.createIcons();
}

window.parseGrades = async function() {
  const kelas = document.getElementById('grade-kelas').value;
  const quizId = document.getElementById('grade-quiz-id').value.trim() || 'Manual';
  const text = document.getElementById('grade-input').value.trim();
  if (!kelas || !text) { showToast('Lengkapi semua field', 'error'); return; }
  const lines = text.split('\n').filter(l => l.trim());
  const students = getStudents().filter(s => s.kelas === kelas);
  const parsed = [];
  for (const line of lines) {
    const match = line.trim().match(/^(\d+)\s+(\d+)$/);
    if (!match) { showToast(`Format salah: "${line.trim()}"`, 'error'); return; }
    const absen = parseInt(match[1]);
    const nilai = parseInt(match[2]);
    const student = students.find(s => s.absen === absen);
    if (!student) { showToast(`Absen ${absen} tidak ditemukan di kelas ${kelas}`, 'error'); return; }
    parsed.push({ type: 'grade', name: student.name, absen, kelas, nilai, quiz_id: quizId, timestamp: new Date().toISOString() });
  }
  if (allData.length + parsed.length > 999) { showToast('Batas data tercapai', 'error'); return; }
  showLoader('Menyimpan nilai…');
  for (const g of parsed) {
    const r = await window.dataSdk.create(g);
    if (!r.isOk) { showToast('Gagal menyimpan', 'error'); hideLoader(); return; }
  }
  hideLoader();
  showToast(`${parsed.length} nilai berhasil disimpan`);
};

// ─── GURU: ACTIVITY POINTS ───
function renderGuruActivity(el) {
  const primary = C('primary_color');
  el.innerHTML = card(`
    <h2 class="font-bold text-base mb-3"><i data-lucide="star" style="width:18px;height:18px;display:inline;vertical-align:middle;margin-right:6px;"></i>Input Point Keaktifan</h2>
    <p class="text-xs opacity-50 mb-3">Format: nomor_absen point (akumulatif, satu per baris)</p>
    <select id="activity-kelas" class="w-full mb-3 px-3 py-2.5 rounded-xl bg-slate-800 border border-slate-700 text-sm">
      <option value="">Pilih Kelas</option>
      <option>7E</option><option>7F</option><option>7G</option>

window.parseActivity = async function() {
  const kelas = document.getElementById('activity-kelas').value;
  const text = document.getElementById('activity-input').value.trim();
  if (!kelas || !text) { showToast('Lengkapi semua field', 'error'); return; }
  const lines = text.split('\n').filter(l => l.trim());
  const students = getStudents().filter(s => s.kelas === kelas);
  const parsed = [];
  for (const line of lines) {
    const match = line.trim().match(/^(\d+)\s+(\d+)$/);
    if (!match) { showToast(`Format keaktifan tidak valid: "${line.trim()}"`, 'error'); return; }
    const absen = parseInt(match[1]);
    const point = parseInt(match[2]);
    const student = students.find(s => s.absen === absen);
    if (!student) { showToast(`Data siswa tidak ditemukan (absen ${absen})`, 'error'); return; }
    parsed.push({ type: 'activity_point', name: student.name, absen, kelas, point, timestamp: new Date().toISOString() });
  }
  if (allData.length + parsed.length > 999) { showToast('Batas data tercapai', 'error'); return; }
  showLoader('Menyimpan point…');
  for (const a of parsed) {
    const r = await window.dataSdk.create(a);
    if (!r.isOk) { showToast('Gagal menyimpan', 'error'); hideLoader(); return; }
  }
  hideLoader();
  showToast(`${parsed.length} point keaktifan disimpan`);
};

window.parseQuiz = async function() {
  const text = document.getElementById('quiz-input').value.trim();
  if (!text) { showToast('Masukkan soal', 'error'); return; }

  const blocks = text.split(/(?=\d+\.\s)/).filter(b => b.trim());
  const parsed = [];
  for (const block of blocks) {
    const lines = block.trim().split('\n').map(l => l.trim()).filter(Boolean);
    const qMatch = lines[0].match(/^(\d+)\.\s*(.+)$/);
    if (!qMatch) { showToast(`Format soal salah: "${lines[0]}"`, 'error'); return; }
    const qNum = parseInt(qMatch[1]);
    const qText = qMatch[2];
    const opts = {};
    let answer = null;
    for (let i = 1; i < lines.length; i++) {
      const optMatch = lines[i].match(/^([A-D])\.\s*(.+)$/i);
      if (optMatch) { opts[optMatch[1].toUpperCase()] = optMatch[2]; continue; }
      const ansMatch = lines[i].match(/^Jawaban[:\s]*([A-D])$/i);
      if (ansMatch) { answer = ansMatch[1].toUpperCase(); }
    }
    if (!opts.A || !opts.B || !opts.C || !opts.D) { showToast(`Soal ${qNum}: harus ada 4 opsi (A-D)`, 'error'); return; }
    if (!answer) { showToast(`Soal ${qNum}: jawaban tidak ditemukan`, 'error'); return; }
    if (!['A','B','C','D'].includes(answer)) { showToast(`Soal ${qNum}: jawaban tidak valid`, 'error'); return; }
    parsed.push({ type: 'question', q_number: qNum, question_text: qText, option_a: opts.A, option_b: opts.B, option_c: opts.C, option_d: opts.D, answer });
  }
  if (allData.length + parsed.length > 999) { showToast('Batas data tercapai', 'error'); return; }
  showLoader('Menyimpan soal…');
  for (const q of parsed) {
    const r = await window.dataSdk.create(q);
    if (!r.isOk) { showToast('Gagal menyimpan', 'error'); hideLoader(); return; }
  }
  hideLoader();
  showToast(`${parsed.length} soal berhasil ditambahkan`);
};

  </div>

    <i data-lucide="alert-triangle" style="width:64px;height:64px;margin-bottom:16px;"></i>
    <h2 class="text-xl font-bold mb-2">⚠ Pelanggaran Terdeteksi!</h2>
    <p class="text-sm opacity-80">Anda terdeteksi keluar dari halaman kuis.</p>
    <p id="cheat-penalty" class="text-sm mt-2 font-bold"></p>
    <p class="text-xs mt-4 opacity-60">Kembali ke kuis dalam beberapa detik…</p>
  </div>`;
  lucide.createIcons();
}

window.selectAnswer = function(opt) { quizState.answers[quizState.currentQ] = opt; renderQuiz(); };
window.flagQuestion = function() {
  if (quizState.flags.has(quizState.currentQ)) quizState.flags.delete(quizState.currentQ);
  else quizState.flags.add(quizState.currentQ);
  renderQuiz();
};
window.goToQuestion = function(i) { quizState.currentQ = i; renderQuiz(); };

function startQuizTimer() {
  if (quizState._timer) clearInterval(quizState._timer);
  quizState._timer = setInterval(() => {
    if (!quizState || quizState.submitted) { clearInterval(quizState._timer); return; }
    quizState.timeLeft--;
    if (quizState.timeLeft <= 0) { submitQuiz(); return; }
    // Update timer display without full re-render
    const timerEl = document.querySelector('header span');
    if (timerEl) {
      const m = Math.floor(quizState.timeLeft / 60);
      const sc = quizState.timeLeft % 60;
      timerEl.textContent = `⏱ ${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
      timerEl.className = `text-xs ${quizState.timeLeft < 60 ? 'text-red-400 font-bold' : 'opacity-70'}`;
    }
  }, 1000);
}

// ─── ANTI-CHEAT ───
function setupAntiCheat() {
  const handleViolation = () => {
    if (!quizState || quizState.submitted) return;
    quizState.violations++;
    const penalty = 20 + (quizState.violations * 10);
    quizState.penaltyTotal += penalty;
    quizState.timeLeft = Math.max(0, quizState.timeLeft - penalty);

    const overlay = document.getElementById('cheat-overlay');
    const penaltyText = document.getElementById('cheat-penalty');
    if (overlay && penaltyText) {
      penaltyText.textContent = `Hukuman: -${penalty} detik (Total pelanggaran: ${quizState.violations}x)`;
      overlay.style.display = 'flex';
      clearTimeout(cheatOverlayTimeout);
      cheatOverlayTimeout = setTimeout(() => {
        if (overlay) overlay.style.display = 'none';
        renderQuiz();
      }, 3000);
    }
  };

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && quizState && !quizState.submitted) handleViolation();
  });
  window.addEventListener('blur', () => {
    if (quizState && !quizState.submitted) handleViolation();
  });
}

window.submitQuiz = async function() {
  if (!quizState || quizState.submitted) return;
  quizState.submitted = true;
  if (quizState._timer) clearInterval(quizState._timer);

  const qs = getQuestions();
  let correct = 0;
  qs.forEach((q, i) => { if (quizState.answers[i] === q.answer) correct++; });
  const nilai = Math.round((correct / qs.length) * 100);
  const elapsed = Math.round((Date.now() - quizState.startTime) / 1000);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;

  showLoader('Mengirim jawaban…');
  if (allData.length >= 999) { showToast('Batas data tercapai', 'error'); hideLoader(); return; }
  const r = await window.dataSdk.create({
    type: 'quiz_result',
    name: currentUser.name,
    absen: currentUser.absen,
    kelas: currentUser.kelas,
    nilai,
    pelanggaran: quizState.violations,
    waktu_selesai: `${mins}m ${secs}s`,
    answers_json: JSON.stringify(quizState.answers),
    timestamp: new Date().toISOString()
  });
  hideLoader();

  if (r.isOk) {
    const app = document.getElementById('app');
    const primary = C('primary_color');
    const surface = C('surface_color');
    app.innerHTML = `
    <div class="h-full flex items-center justify-center p-4 fade-in">
      <div style="background:${surface};" class="rounded-2xl p-6 text-center max-w-sm w-full">
        <div class="text-5xl mb-3">${nilai >= 80 ? '🎉' : nilai >= 60 ? '👍' : '📝'}</div>
        <h2 class="text-xl font-bold mb-1">Kuis Selesai!</h2>
        <div class="text-4xl font-bold my-4" style="color:${primary};">${nilai}</div>
        <p class="text-sm opacity-60 mb-1">${correct} dari ${qs.length} benar</p>
        <p class="text-xs opacity-40 mb-1">Waktu: ${mins}m ${secs}s</p>
        ${quizState.violations > 0 ? `<p class="text-xs text-red-400">Pelanggaran: ${quizState.violations}x</p>` : ''}
        <button onclick="backToDashboard()" style="background:${primary};" class="mt-5 w-full py-3 rounded-xl text-sm font-semibold text-white">Kembali ke Dashboard</button>
      </div>
    </div>`;
  } else {
    showToast('Gagal mengirim jawaban', 'error');
  }
};

window.backToDashboard = function() {
  quizState = null;
  currentView = 'siswa-dashboard';
  siswaTab = 'home';
  renderCurrentView();
};
